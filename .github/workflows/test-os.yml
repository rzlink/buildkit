name: test-os

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#permissions
permissions:
  contents: read

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:
  push:
    branches:
      - 'master'
      - 'v[0-9]+.[0-9]+'
  pull_request:
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'frontend/dockerfile/docs/**'

env:
  GO_VERSION: "1.26"
  SETUP_BUILDX_VERSION: "edge"
  SETUP_BUILDKIT_IMAGE: "moby/buildkit:latest"
  DESTDIR: "./bin"

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        platform:
          - windows/amd64
          - windows/arm64
          - freebsd/amd64
    steps:
      -
        name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: ${{ env.SETUP_BUILDX_VERSION }}
          driver-opts: image=${{ env.SETUP_BUILDKIT_IMAGE }}
          buildkitd-flags: --debug
      -
        name: Build
        uses: docker/bake-action@v7
        with:
          provenance: false
          targets: binaries-for-test
          set: |
            *.platform=${{ matrix.platform }}
            *.cache-from=type=gha,scope=binaries-for-test-${{ env.PLATFORM_PAIR }}
            *.cache-to=type=gha,scope=binaries-for-test-${{ env.PLATFORM_PAIR }},repository=${{ github.repository }},ghtoken=${{ secrets.GITHUB_TOKEN }}
      -
        name: List artifacts
        run: |
          tree -nh ${{ env.DESTDIR }}
      -
        name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: buildkit-${{ env.PLATFORM_PAIR }}
          path: ${{ env.DESTDIR }}/*
          if-no-files-found: error
          retention-days: 1

  test-windows-amd64:
    runs-on: ${{ matrix.os }}
    needs:
      - build
    env:
      TESTFLAGS: "-v --timeout=60m"
      GOTESTSUM_FORMAT: "standard-verbose"
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022]
        worker:
          - containerd
        pkg:
          - ./client#1-4
          - ./client#2-4
          - ./client#3-4
          - ./client#4-4
          - ./cmd/buildctl
          - ./worker/containerd
          - ./solver
          - ./frontend
          - ./frontend/dockerfile#1-12
          - ./frontend/dockerfile#2-12
          - ./frontend/dockerfile#3-12
          - ./frontend/dockerfile#4-12
          - ./frontend/dockerfile#5-12
          - ./frontend/dockerfile#6-12
          - ./frontend/dockerfile#7-12
          - ./frontend/dockerfile#8-12
          - ./frontend/dockerfile#9-12
          - ./frontend/dockerfile#10-12
          - ./frontend/dockerfile#11-12
          - ./frontend/dockerfile#12-12
        include:
          - os: windows-2022
            worker: containerd
            pkg: ./...
            skip-integration-tests: 1
    steps:
      -
        name: Prepare
        run: |
          TESTPKG=$(echo "${{ matrix.pkg }}" | awk '-F#' '{print $1}')
          echo "TESTPKG=$TESTPKG" >> $GITHUB_ENV
          echo "TEST_REPORT_NAME=${{ github.job }}-$(echo "${{ matrix.pkg }}-${{ matrix.skip-integration-tests }}-${{ matrix.worker }}" | tr -dc '[:alnum:]-\n\r' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          testFlags="${{ env.TESTFLAGS }}"
          testSlice=$(echo "${{ matrix.pkg }}" | awk '-F#' '{print $2}')
          testSliceOffset=""
          if [ -n "$testSlice" ]; then
            testSliceOffset="slice=$testSlice/"
          fi
          if [ -n "${{ matrix.worker }}" ]; then
            testFlags="${testFlags} --run=TestIntegration/$testSliceOffset.*/worker=${{ matrix.worker }}"
          fi
          echo "TESTFLAGS=${testFlags}" >> $GITHUB_ENV
        shell: bash
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Expose GitHub Runtime
        uses: crazy-max/ghaction-github-runtime@v4
      -
        name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "${{ env.GO_VERSION }}"
          cache: false
      -
        name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: buildkit-windows-amd64
          path: ${{ github.workspace }}\bin
      -
        name: Add bin folder to Path
        run: |
          echo "${{ github.workspace }}\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      -
        name: Test
        env:
          TMPDIR: ${{ runner.temp }}
          SKIP_INTEGRATION_TESTS: ${{ matrix.skip-integration-tests }}
        run: |
          mkdir -p ./bin/testreports
          gotestsum \
            --jsonfile="./bin/testreports/go-test-report-${{ env.TEST_REPORT_NAME }}.json" \
            --junitfile="./bin/testreports/junit-report-${{ env.TEST_REPORT_NAME }}.xml" \
            --packages="${{ env.TESTPKG }}" \
            -- \
              "-mod=vendor" \
              "-coverprofile" "./bin/testreports/coverage-${{ env.TEST_REPORT_NAME }}.txt" \
              "-covermode" "atomic" ${{ env.TESTFLAGS }}
        shell: bash
      -
        name: Send to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          directory: ./bin/testreports
          env_vars: RUNNER_OS
          flags: unit
          disable_file_fixes: true
          token: ${{ secrets.CODECOV_TOKEN }}  # used to upload coverage reports: https://github.com/moby/buildkit/pull/4660#issue-2142122533
      -
        name: Generate annotations
        if: always()
        uses: crazy-max/.github/.github/actions/gotest-annotations@fa6141aedf23596fb8bdcceab9cce8dadaa31bd9
        with:
          directory: ./bin/testreports
      -
        name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-${{ matrix.os }}-${{ env.TEST_REPORT_NAME }}
          path: ./bin/testreports
          retention-days: 1
      -
        name: Dump context
        if: failure()
        uses: crazy-max/ghaction-dump-context@v2

  test-windows-arm64:
    # Only run on repos with Azure OIDC credentials configured
    if: ${{ github.repository == 'rzlink/buildkit' }}
    runs-on: ubuntu-24.04
    needs:
      - build
    permissions:
      contents: read
      id-token: write
    env:
      TESTFLAGS: "-v --timeout=60m"
      GOTESTSUM_FORMAT: "standard-verbose"
      AZURE_LOCATION: "eastus2"
      AZURE_VM_SIZE: "Standard_D4ps_v6"
    strategy:
      fail-fast: false
      matrix:
        worker:
          - containerd
        pkg:
          - ./client#1-4
          - ./client#2-4
          - ./client#3-4
          - ./client#4-4
          - ./cmd/buildctl
          - ./worker/containerd
          - ./solver
          - ./frontend
          - ./frontend/dockerfile#1-12
          - ./frontend/dockerfile#2-12
          - ./frontend/dockerfile#3-12
          - ./frontend/dockerfile#4-12
          - ./frontend/dockerfile#5-12
          - ./frontend/dockerfile#6-12
          - ./frontend/dockerfile#7-12
          - ./frontend/dockerfile#8-12
          - ./frontend/dockerfile#9-12
          - ./frontend/dockerfile#10-12
          - ./frontend/dockerfile#11-12
          - ./frontend/dockerfile#12-12
        include:
          - worker: containerd
            pkg: ./...
            skip-integration-tests: 1
    steps:
      -
        name: Prepare
        run: |
          TESTPKG=$(echo "${{ matrix.pkg }}" | awk '-F#' '{print $1}')
          echo "TESTPKG=$TESTPKG" >> $GITHUB_ENV
          echo "TEST_REPORT_NAME=${{ github.job }}-$(echo "${{ matrix.pkg }}-${{ matrix.skip-integration-tests }}-${{ matrix.worker }}" | tr -dc '[:alnum:]-\n\r' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          testFlags="${{ env.TESTFLAGS }}"
          testSlice=$(echo "${{ matrix.pkg }}" | awk '-F#' '{print $2}')
          testSliceOffset=""
          if [ -n "$testSlice" ]; then
            testSliceOffset="slice=$testSlice/"
          fi
          if [ -n "${{ matrix.worker }}" ]; then
            testFlags="${testFlags} --run=TestIntegration/$testSliceOffset.*/worker=${{ matrix.worker }}"
          fi
          echo "TESTFLAGS=${testFlags}" >> $GITHUB_ENV
          # Unique resource group name per matrix entry
          echo "AZURE_VM_RG_NAME=buildkit-arm64-${{ github.run_id }}-${{ strategy.job-index }}" >> $GITHUB_ENV
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      -
        name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: buildkit-windows-arm64
          path: ./bin
      -
        name: Create Azure ARM64 VM
        run: |
          chmod +x ./hack/azure-windows-arm64-vm.sh
          ./hack/azure-windows-arm64-vm.sh create
        env:
          GO_VERSION: "${{ env.GO_VERSION }}"
      -
        name: Setup VM environment
        run: |
          ./hack/azure-windows-arm64-vm.sh setup
        env:
          GO_VERSION: "${{ env.GO_VERSION }}"
      -
        name: Copy source and binaries to VM
        run: |
          # Create a tar of the source (vendor included for -mod=vendor)
          tar czf /tmp/buildkit-source.tar.gz \
            --exclude='.git' \
            --exclude='bin' \
            .

          # Upload source tar to VM via blob storage
          STORAGE_ACCOUNT="buildkitci${AZURE_VM_RG_NAME//[^a-z0-9]/}"
          STORAGE_ACCOUNT="${STORAGE_ACCOUNT:0:24}"
          az storage account create \
            --name "$STORAGE_ACCOUNT" \
            --resource-group "$AZURE_VM_RG_NAME" \
            --location "$AZURE_LOCATION" \
            --sku Standard_LRS \
            --output none
          az storage container create \
            --name source \
            --account-name "$STORAGE_ACCOUNT" \
            --auth-mode login \
            --output none
          az storage blob upload \
            --account-name "$STORAGE_ACCOUNT" \
            --container-name source \
            --name source.tar.gz \
            --file /tmp/buildkit-source.tar.gz \
            --auth-mode login \
            --output none

          # Upload binaries
          for f in ./bin/*; do
            az storage blob upload \
              --account-name "$STORAGE_ACCOUNT" \
              --container-name source \
              --name "bin/$(basename "$f")" \
              --file "$f" \
              --auth-mode login \
              --output none
          done

          # Generate SAS URL for download on VM
          EXPIRY=$(date -u -d "+2 hours" +%Y-%m-%dT%H:%MZ)
          ACCOUNT_KEY=$(az storage account keys list --resource-group "$AZURE_VM_RG_NAME" --account-name "$STORAGE_ACCOUNT" --query "[0].value" --output tsv)
          SOURCE_URL=$(az storage blob generate-sas \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "$ACCOUNT_KEY" \
            --container-name source \
            --name source.tar.gz \
            --permissions r \
            --expiry "$EXPIRY" \
            --full-uri \
            --output tsv)

          # Download and extract on VM
          ./hack/azure-windows-arm64-vm.sh run-on-vm "
            \$ErrorActionPreference = 'Stop'
            Write-Output 'Downloading source...'
            curl.exe --retry 5 --retry-delay 5 -sL '$SOURCE_URL' --output C:\buildkit\source.tar.gz
            Write-Output 'Extracting source...'
            cd C:\buildkit
            tar xzf source.tar.gz
            Remove-Item source.tar.gz
            Write-Output 'Source extracted'
            Get-ChildItem C:\buildkit | Format-Table Name
          " "Download and extract source"

          # Download binaries to VM
          for f in ./bin/*; do
            BNAME=$(basename "$f")
            BIN_URL=$(az storage blob generate-sas \
              --account-name "$STORAGE_ACCOUNT" \
              --account-key "$ACCOUNT_KEY" \
              --container-name source \
              --name "bin/$BNAME" \
              --permissions r \
              --expiry "$EXPIRY" \
              --full-uri \
              --output tsv)
            ./hack/azure-windows-arm64-vm.sh run-on-vm "
              curl.exe --retry 5 --retry-delay 5 -sL '$BIN_URL' --output C:\buildkit\bin\$BNAME
            " "Download binary $BNAME"
          done
        shell: bash
      -
        name: Test
        env:
          TMPDIR: ${{ runner.temp }}
          SKIP_INTEGRATION_TESTS: ${{ matrix.skip-integration-tests }}
        run: |
          ./hack/azure-windows-arm64-vm.sh run-on-vm "
            \$ErrorActionPreference = 'Stop'
            \$env:GOROOT = 'C:\go'
            \$env:GOPATH = 'C:\gopath'
            \$env:TMPDIR = 'C:\tmp'
            \$env:Path = 'C:\buildkit\bin;C:\go\bin;C:\gopath\bin;' + \$env:Path
            \$env:SKIP_INTEGRATION_TESTS = '${{ matrix.skip-integration-tests }}'

            cd C:\buildkit
            New-Item -ItemType Directory -Force -Path C:\buildkit\bin\testreports | Out-Null

            gotestsum --jsonfile='C:\buildkit\bin\testreports\go-test-report-${{ env.TEST_REPORT_NAME }}.json' --junitfile='C:\buildkit\bin\testreports\junit-report-${{ env.TEST_REPORT_NAME }}.xml' --packages='${{ env.TESTPKG }}' -- '-mod=vendor' '-coverprofile' 'C:\buildkit\bin\testreports\coverage-${{ env.TEST_REPORT_NAME }}.txt' '-covermode' 'atomic' ${{ env.TESTFLAGS }}
          " "Run tests"
        shell: bash
      -
        name: Collect test reports
        if: always()
        run: |
          mkdir -p ./bin/testreports
          # Download reports via storage account
          STORAGE_ACCOUNT="buildkitci${AZURE_VM_RG_NAME//[^a-z0-9]/}"
          STORAGE_ACCOUNT="${STORAGE_ACCOUNT:0:24}"

          # Upload reports from VM to storage
          ./hack/azure-windows-arm64-vm.sh run-on-vm "
            \$ErrorActionPreference = 'Stop'
            \$files = Get-ChildItem C:\buildkit\bin\testreports -File
            foreach (\$f in \$files) {
              Write-Output \"Report: \$(\$f.Name) (\$(\$f.Length) bytes)\"
            }
          " "List test reports" || true

          # Use az vm run-command to base64-encode and extract reports
          for report_type in go-test-report junit-report coverage; do
            REPORT_FILE="${report_type}-${{ env.TEST_REPORT_NAME }}"
            RESULT=$(./hack/azure-windows-arm64-vm.sh run-on-vm "
              \$f = 'C:\buildkit\bin\testreports\\${REPORT_FILE}'
              if (Test-Path (\$f + '.json')) { \$f = \$f + '.json' }
              elseif (Test-Path (\$f + '.xml')) { \$f = \$f + '.xml' }
              elseif (Test-Path (\$f + '.txt')) { \$f = \$f + '.txt' }
              if (Test-Path \$f) {
                [Convert]::ToBase64String([IO.File]::ReadAllBytes(\$f))
              } else {
                Write-Output 'NOT_FOUND'
              }
            " "Collect $report_type" 2>/dev/null || echo "")

            # Extract base64 content from az vm run-command JSON output
            CONTENT=$(echo "$RESULT" | jq -r '.value[0].message // ""' | grep -v '^\[stdout\]' | grep -v '^\[stderr\]' | tr -d '\n\r ')
            if [ -n "$CONTENT" ] && [ "$CONTENT" != "NOT_FOUND" ]; then
              EXT=".txt"
              case "$report_type" in
                go-test-report) EXT=".json" ;;
                junit-report) EXT=".xml" ;;
                coverage) EXT=".txt" ;;
              esac
              echo "$CONTENT" | base64 -d > "./bin/testreports/${REPORT_FILE}${EXT}" || true
            fi
          done
        shell: bash
      -
        name: Send to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          directory: ./bin/testreports
          env_vars: RUNNER_OS
          flags: unit
          disable_file_fixes: true
          token: ${{ secrets.CODECOV_TOKEN }}
      -
        name: Generate annotations
        if: always()
        uses: crazy-max/.github/.github/actions/gotest-annotations@fa6141aedf23596fb8bdcceab9cce8dadaa31bd9
        with:
          directory: ./bin/testreports
      -
        name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-windows-arm64-${{ env.TEST_REPORT_NAME }}
          path: ./bin/testreports
          retention-days: 1
      -
        name: Destroy Azure VM
        if: always()
        run: |
          ./hack/azure-windows-arm64-vm.sh destroy
        shell: bash
      -
        name: Dump context
        if: failure()
        uses: crazy-max/ghaction-dump-context@v2

  test-freebsd-amd64:
    runs-on: ubuntu-22.04
    needs:
      - build
    env:
      GOOS: freebsd
      # https://github.com/hashicorp/vagrant/issues/13652
      VAGRANT_DISABLE_STRICT_DEPENDENCY_ENFORCEMENT: 1
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: buildkit-freebsd-amd64
          path: ${{ env.DESTDIR }}
      -
        name: Cache Vagrant boxes
        uses: actions/cache@v5
        with:
          path: ~/.vagrant.d/boxes
          key: ${{ runner.os }}-vagrant-${{ hashFiles('hack/Vagrantfile.freebsd') }}
          restore-keys: |
            ${{ runner.os }}-vagrant-
      -
        name: Install vagrant
        run: |
          set -x
          wget -O - https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update
          sudo apt-get install -y libvirt-dev libvirt-daemon libvirt-daemon-system vagrant vagrant-libvirt ruby-libvirt
          sudo systemctl enable --now libvirtd
          sudo chmod a+rw /var/run/libvirt/libvirt-sock
          vagrant plugin install vagrant-libvirt
          vagrant --version
      -
        name: Set up vagrant
        run: |
          ln -sf hack/Vagrantfile.freebsd Vagrantfile
          vagrant up --no-tty
      -
        name: Smoke test
        uses: nick-fields/retry@ce71cc2ab81d554ebbe88c79ab5975992d79ba08  # v3.0.2
        with:
          timeout_minutes: 20
          max_attempts: 5
          command: |
            vagrant up --provision-with=test-smoke
      -
        name: BuildKit logs
        if: always()
        run: |
          vagrant ssh -- "sudo cat /vagrant/.tmp/logs/buildkitd"
      -
        name: Containerd logs
        if: always()
        run: |
          vagrant ssh -- "sudo cat /vagrant/.tmp/logs/containerd"

  sandbox-build:
    if: ${{ github.repository == 'moby/buildkit' }}
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          version: ${{ env.SETUP_BUILDX_VERSION }}
          driver-opts: image=${{ env.SETUP_BUILDKIT_IMAGE }}
          buildkitd-flags: --debug
      -
        name: Build
        uses: docker/bake-action@v7
        with:
          targets: integration-tests-base
          set: |
            *.platform=${{ matrix.platform }}
